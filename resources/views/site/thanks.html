<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо - TaxiShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">TaxiShop <i class="fa-solid fa-taxi"></i></a>
            <div class="driver-info"><i class="fa-solid fa-id-badge"></i> Водитель: Иван Петров</div>
        </div>
    </header>

    <div class="thanks-page">
        <div class="thanks-card">
            <div class="check-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            
            <h1 class="thanks-title">Спасибо! Ваш заказ принят</h1>
            <p style="font-size: 18px; color: var(--text-muted);">Водитель уже собирает ваши товары.</p>
            
            <div class="order-number">Заказ: TS-000042</div>
            
            <div style="background: var(--bg-color); padding: 15px; border-radius: var(--radius-md); margin-bottom: 30px;">
                <strong>Способ оплаты:</strong><br>
                💵 Наличные водителю<br>
                <span style="font-size: 20px; font-weight: 800; margin-top: 5px; display: block;">Сумма: 53 000 сум</span>
            </div>

            <a href="index.html" class="btn btn-primary btn-block">Вернуться в каталог</a>
        </div>
    </div>
</body>
</html>
