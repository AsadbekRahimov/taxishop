<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - TaxiShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">TaxiShop <i class="fa-solid fa-taxi"></i></a>
            <div class="driver-info"><i class="fa-solid fa-id-badge"></i> Водитель: Иван Петров</div>
            <div class="header-actions">
                <a href="cart.html" class="cart-btn"><i class="fa-solid fa-shopping-cart"></i><span class="cart-badge">3</span></a>
            </div>
        </div>
    </header>

    <div class="container" style="max-width: 900px; padding-top: 30px; padding-bottom: 50px;">
        <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 20px;">Корзина (3)</h1>

        <!-- Элемент корзины -->
        <div class="cart-item">
            <img src="https://placehold.co/200x200/E5E7EB/A3A8B8?text=Water">
            <div class="cart-item-info">
                <div class="cart-item-title">Вода минеральная Hydrolife 0.5л</div>
                <div style="color: var(--text-muted);">4 000 сум / шт.</div>
            </div>
            <div class="qty-control">
                <button class="qty-btn">-</button>
                <input type="number" value="2" class="qty-input" readonly>
                <button class="qty-btn">+</button>
            </div>
            <div class="cart-item-total">8 000 сум</div>
            <button class="cart-item-remove"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- Элемент корзины -->
        <div class="cart-item">
            <img src="https://placehold.co/200x200/E5E7EB/A3A8B8?text=Cable">
            <div class="cart-item-info">
                <div class="cart-item-title">Кабель зарядки Type-C</div>
                <div style="color: var(--text-muted);">45 000 сум / шт.</div>
            </div>
            <div class="qty-control">
                <button class="qty-btn">-</button>
                <input type="number" value="1" class="qty-input" readonly>
                <button class="qty-btn">+</button>
            </div>
            <div class="cart-item-total">45 000 сум</div>
            <button class="cart-item-remove"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="cart-summary-total">Итого: 53 000 сум</div>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            <a href="checkout.html" class="btn btn-primary btn-block" style="padding: 20px; font-size: 24px;">Оформить заказ</a>
            <a href="index.html" class="btn btn-outline btn-block">Продолжить покупки</a>
        </div>
    </div>
</body>
</html>
