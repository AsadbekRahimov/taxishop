<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - TaxiShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">
            TaxiShop <i class="fa-solid fa-taxi"></i>
        </div>
        <form action="index.html">
            <div class="form-group">
                <input type="text" class="form-control" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control" placeholder="Введите пароль" required>
            </div>
            <div class="form-group" style="margin-bottom: 30px;">
                <label class="checkbox-wrap">
                    <input type="checkbox" checked> Запомнить меня
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Войти в систему</button>
        </form>
    </div>
</body>
</html>
