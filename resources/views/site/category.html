<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Напитки - TaxiShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">TaxiShop <i class="fa-solid fa-taxi"></i></a>
            <div class="driver-info"><i class="fa-solid fa-id-badge"></i> Водитель: Иван Петров</div>
            <div class="header-actions">
                <a href="cart.html" class="cart-btn"><i class="fa-solid fa-shopping-cart"></i><span class="cart-badge">3</span></a>
                <a href="login.html" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="breadcrumbs">
            <a href="index.html">Главная</a> / <a href="category.html">Напитки</a> / Вода
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="font-size: 36px; font-weight: 800;">Напитки</h1>
            <select class="form-control" style="width: auto; padding: 10px 40px 10px 20px;">
                <option>По популярности</option>
                <option>По цене ↑</option>
                <option>По цене ↓</option>
                <option>Новинки</option>
            </select>
        </div>

        <div class="product-grid">
            <!-- Products (Repeated 8 times for grid example) -->
            <a href="product.html" class="product-card">
                <span class="product-badge">В машине</span>
                <img src="https://placehold.co/400x400/E5E7EB/A3A8B8?text=Water" class="product-img">
                <div class="product-title">Вода минеральная 0.5л</div>
                <div class="product-price-block">
                    <span class="price-new">4 000 сум</span>
                </div>
            </a>
            <a href="product.html" class="product-card">
                <img src="https://placehold.co/400x400/E5E7EB/A3A8B8?text=Juice" class="product-img">
                <div class="product-title">Сок яблочный 1л (Доставка)</div>
                <div class="product-price-block">
                    <span class="price-new">18 000 сум</span>
                </div>
            </a>
            <a href="product.html" class="product-card">
                <span class="product-badge">В машине</span>
                <img src="https://placehold.co/400x400/E5E7EB/A3A8B8?text=Cola" class="product-img">
                <div class="product-title">Coca-Cola 0.5л</div>
                <div class="product-price-block">
                    <span class="price-new">7 000 сум</span>
                </div>
            </a>
            <a href="product.html" class="product-card">
                <img src="https://placehold.co/400x400/E5E7EB/A3A8B8?text=Energy" class="product-img">
                <div class="product-title">Энергетик Red Bull</div>
                <div class="product-price-block">
                    <span class="price-new">20 000 сум</span>
                    <span class="price-old">25 000 сум</span>
                </div>
            </a>
        </div>

        <!-- Pagination -->
        <div style="display: flex; justify-content: center; gap: 10px; margin: 40px 0 60px;">
            <button class="btn btn-outline" style="min-width: 44px; padding: 0;">1</button>
            <button class="btn btn-primary" style="min-width: 44px; padding: 0;">2</button>
            <button class="btn btn-outline" style="min-width: 44px; padding: 0;">3</button>
            <button class="btn btn-outline" style="min-width: 44px; padding: 0;"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>
</body>
</html>
